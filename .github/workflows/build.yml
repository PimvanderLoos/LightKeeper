name: Test, build, and upload LightKeeper

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'
  workflow_dispatch:

env:
  MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss,SSS"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build, test, and analyse
        run: |
          mvn --batch-mode --show-version --no-transfer-progress \
            -Perrorprone \
            clean verify \
            checkstyle:checkstyle \
            pmd:check \
            jacoco:report \
            -Dgoal=helpmojo

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          directory: lightkeeper-report-aggregate/target/site/jacoco-aggregate
          token: ${{ secrets.CODECOV_TOKEN }}
